name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Compile sources
        run: python3 -m py_compile $(find "src" -name '*.py' | sort) $(find "tests" -name '*.py' | sort)

      - name: Run unit tests
        run: uv run python -m unittest discover -s "tests" -v
